# Workshop stack — minimal footprint
# Brings up:
#   * postgres + langfuse server on localhost:3000  (LLM-native observability)
#   * jaeger all-in-one on localhost:16686         (OTel trace UI)
# Start with: docker compose up -d
# Stop with:  docker compose down
# Nuke data:  docker compose down -v

services:
  langfuse-db:
    image: postgres:15-alpine
    container_name: llmops-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: llmops-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: workshop-dev-secret-change-me
      SALT: workshop-dev-salt-change-me
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: devopsdays
      LANGFUSE_INIT_ORG_NAME: DevOpsDays
      LANGFUSE_INIT_PROJECT_ID: llmops-workshop
      LANGFUSE_INIT_PROJECT_NAME: LLMOps Workshop
      LANGFUSE_INIT_USER_EMAIL: workshop@local.dev
      LANGFUSE_INIT_USER_NAME: Workshop User
      LANGFUSE_INIT_USER_PASSWORD: workshop123

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: llmops-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  langfuse_db_data:
